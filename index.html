<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux Cheat Sheet — Interactive Terminal</title>
  <meta name="description" content="An interactive, categorised Linux commands cheat sheet with an embedded mini terminal to practice commands." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header>
  <div class="header-logo" aria-hidden="true">🐧</div>
  <div class="header-title">
    <h1>Linux Cheat Sheet</h1>
    <p>Interactive reference with built-in terminal</p>
  </div>
  <div class="header-actions">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="6" cy="6" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/>
      </svg>
      <input id="search" type="search" placeholder="Search commands…" aria-label="Search commands" autocomplete="off" spellcheck="false" />
    </div>
    <button class="btn" id="toggle-terminal-btn" title="Toggle terminal panel">⌨ Terminal</button>
  </div>
</header>

<!-- ══════════════ APP LAYOUT ══════════════ -->
<div class="app-layout">
  <main class="main-content" id="main-content">

    <!-- Category filter pills -->
    <div class="filter-bar" id="filter-bar" role="group" aria-label="Filter by category">
      <button class="filter-pill active" data-cat="all">All</button>
      <button class="filter-pill" data-cat="files">📁 Files &amp; Dirs</button>
      <button class="filter-pill" data-cat="content">📄 File Content</button>
      <button class="filter-pill" data-cat="permissions">🔒 Permissions</button>
      <button class="filter-pill" data-cat="processes">⚙ Processes</button>
      <button class="filter-pill" data-cat="system">🖥 System</button>
      <button class="filter-pill" data-cat="networking">🌐 Networking</button>
      <button class="filter-pill" data-cat="archiving">📦 Archiving</button>
      <button class="filter-pill" data-cat="users">👤 Users</button>
      <button class="filter-pill" data-cat="text">✏ Text Processing</button>
    </div>

    <!-- Command cards grid -->
    <div class="commands-grid" id="commands-grid"></div>
  </main>

  <!-- ══════════════ TERMINAL PANEL ══════════════ -->
  <section id="terminal-panel" role="region" aria-label="Interactive terminal">
    <div class="term-topbar">
      <div class="term-dots" aria-hidden="true">
        <span class="term-dot red"></span>
        <span class="term-dot yellow"></span>
        <span class="term-dot green"></span>
      </div>
      <span class="term-title">bash — Linux Cheat Sheet Terminal</span>
      <div class="term-controls">
        <span class="term-hint">↑↓ history · Tab autocomplete · Ctrl+C cancel</span>
        <button class="term-clear-btn" id="term-clear" title="Clear terminal output">Clear</button>
        <button class="term-toggle-btn" id="term-expand" title="Expand terminal">⤢</button>
        <button class="term-toggle-btn" id="term-toggle" title="Collapse terminal">−</button>
      </div>
    </div>
    <div class="term-body" id="term-body" aria-live="polite" aria-label="Terminal output"></div>
    <div class="term-input-row">
      <span class="term-prompt-label" id="term-prompt-label" aria-hidden="true">user@linux-box:~$ </span>
      <input
        id="term-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Terminal input"
        placeholder="Type a command and press Enter…"
      />
    </div>
  </section>
</div>

<!-- Toast notification -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- ══════════════ CHEAT SHEET DATA ══════════════ -->
<script>

      { name: 'mkdir',        args: '-p dir/sub',   desc: 'Create directories (including parents)' },
      { name: 'touch',        args: 'file.txt',     desc: 'Create empty file / update timestamp' },
      { name: 'cp',           args: 'src.txt dst.txt', desc: 'Copy file to destination' },

      { name: 'find',         args: '. -name "*.txt"', desc: 'Find files matching a pattern' },
      { name: 'find',         args: '/etc -type f', desc: 'Find all regular files under /etc' },

<!-- ══════════════ CHEAT SHEET RENDERER ══════════════ -->
<script type="module">
import { insertCommand, runImmediate } from './js/terminal.js';

const grid     = document.getElementById('commands-grid');
const searchEl = document.getElementById('search');
const filterBar= document.getElementById('filter-bar');
const toast    = document.getElementById('toast');

let activeCategory = 'all';
let searchQuery    = '';
let toastTimer     = null;

/* ── Toast ─────────────────────────────────────────────── */
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

/* ── Copy to clipboard ─────────────────────────────────── */
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}

/* ── Build the full command string ─────────────────────── */
function fullCmd(name, args) {
  return args ? `${name} ${args}` : name;
}

/* ── Render grid ────────────────────────────────────────── */
function renderGrid() {
  grid.innerHTML = '';

  const q = searchQuery.toLowerCase();
  let anyVisible = false;

  for (const cat of CHEAT_DATA) {
    if (activeCategory !== 'all' && cat.id !== activeCategory) continue;

    const filteredCmds = cat.commands.filter(c => {
      if (!q) return true;
      return c.name.includes(q) || c.desc.toLowerCase().includes(q) || (c.args && c.args.toLowerCase().includes(q));
    });

    if (!filteredCmds.length) continue;
    anyVisible = true;

    const card = document.createElement('div');
    card.className = 'cat-card';
    card.dataset.cat = cat.id;

    card.innerHTML = `
      <div class="cat-header">
        <span class="cat-icon" aria-hidden="true">${cat.icon}</span>
        <span class="cat-title">${cat.title}</span>
        <span class="cat-count">${filteredCmds.length}</span>
      </div>
      <div class="cmd-list"></div>
    `;

    const list = card.querySelector('.cmd-list');

    for (const cmd of filteredCmds) {
      const row = document.createElement('div');
      row.className = 'cmd-row';
      row.title = `Click to insert into terminal`;

      const cmdStr = fullCmd(cmd.name, cmd.args);

      row.innerHTML = `
        <span class="cmd-name">${escHtml(cmd.name)}</span>
        <span class="cmd-desc">${cmd.args ? `<code style="font-family:var(--font-mono);font-size:0.77rem;color:var(--text-muted)">${escHtml(cmd.args)}</code><br>` : ''}${escHtml(cmd.desc)}</span>
        <span class="cmd-actions">
          <button class="icon-btn run"   title="Run in terminal">▶ Run</button>
          <button class="icon-btn copy"  title="Copy command">⎘ Copy</button>
          <button class="icon-btn insert"title="Insert into terminal">↵ Use</button>
        </span>
      `;

      // Clicking the row itself inserts the command
      row.addEventListener('click', (e) => {
        if (e.target.closest('.icon-btn')) return;
        insertCommand(cmdStr);
        showToast(`Inserted: ${cmdStr}`);
      });

      row.querySelector('.run').addEventListener('click', (e) => {
        e.stopPropagation();
        runImmediate(cmdStr);
        showToast(`Running: ${cmdStr}`);
      });

      row.querySelector('.copy').addEventListener('click', (e) => {
        e.stopPropagation();
        copyText(cmdStr);
      });

      row.querySelector('.insert').addEventListener('click', (e) => {
        e.stopPropagation();
        insertCommand(cmdStr);
        showToast(`Inserted: ${cmdStr}`);
      });

      list.appendChild(row);
    }

    grid.appendChild(card);
  }

  if (!anyVisible) {
    grid.innerHTML = `
      <div class="no-results">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>No commands matched "<strong>${escHtml(q)}</strong>"</p>
        <p style="margin-top:0.3rem;font-size:0.75rem">Try a different keyword or reset the filter.</p>
      </div>
    `;
  }
}

/* ── HTML escape ────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── Filter pills ───────────────────────────────────────── */
filterBar.addEventListener('click', (e) => {
  const pill = e.target.closest('.filter-pill');
  if (!pill) return;
  filterBar.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeCategory = pill.dataset.cat;
  renderGrid();
});

/* ── Search ─────────────────────────────────────────────── */
let searchDebounce;
searchEl.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    searchQuery = searchEl.value.trim();
    renderGrid();
  }, 180);
});

/* ── Toggle terminal from header button ─────────────────── */
document.getElementById('toggle-terminal-btn').addEventListener('click', () => {
  document.getElementById('term-toggle').click();
});

/* ── Initial render ─────────────────────────────────────── */
renderGrid();
</script>

</body>
</html>
